<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Telegram Clone - Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --bg-tertiary: #1a1a25;
      --bg-card: #16161f;
      --accent: #8b5cf6;
      --accent-hover: #a78bfa;
      --accent-glow: rgba(139, 92, 246, 0.4);
      --success: #10b981;
      --warning: #f59e0b;
      --error: #ef4444;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --border: #2e2e3a;
      --radius: 12px;
      --radius-lg: 20px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Animated background */
    .bg-pattern {
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(ellipse at 20% 20%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(59, 130, 246, 0.1) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .bg-grid {
      position: fixed;
      inset: 0;
      background-image: 
        linear-gradient(rgba(139, 92, 246, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(139, 92, 246, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 1400px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    /* Login page */
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 48px;
      width: 100%;
      max-width: 420px;
      box-shadow: 
        0 0 60px rgba(139, 92, 246, 0.15),
        0 25px 50px -12px rgba(0, 0, 0, 0.5);
      animation: fadeInUp 0.6s ease-out;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-logo .icon {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, var(--accent), #6366f1);
      border-radius: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin-bottom: 16px;
      box-shadow: 0 0 30px var(--accent-glow);
    }

    .login-logo h1 {
      font-size: 28px;
      font-weight: 600;
      background: linear-gradient(135deg, var(--text-primary), var(--accent-hover));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .login-logo p {
      color: var(--text-secondary);
      margin-top: 8px;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group input {
      width: 100%;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      color: var(--text-primary);
      font-size: 15px;
      font-family: inherit;
      transition: all 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .form-group input::placeholder {
      color: var(--text-muted);
    }

    .btn-primary {
      width: 100%;
      background: linear-gradient(135deg, var(--accent), #6366f1);
      border: none;
      border-radius: var(--radius);
      padding: 16px;
      color: white;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 0 20px var(--accent-glow);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 30px var(--accent-glow), 0 10px 20px rgba(0, 0, 0, 0.3);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    /* Dashboard */
    .dashboard {
      display: none;
    }

    .dashboard.active {
      display: block;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 40px;
    }

    .header h1 {
      font-size: 32px;
      font-weight: 700;
    }

    .header-actions {
      display: flex;
      gap: 12px;
    }

    .btn-logout {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 20px;
      color: var(--text-secondary);
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-logout:hover {
      background: var(--error);
      color: white;
      border-color: var(--error);
    }

    /* Stats grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
      transition: all 0.3s;
    }

    .stat-card:hover {
      border-color: var(--accent);
      box-shadow: 0 0 30px var(--accent-glow);
      transform: translateY(-4px);
    }

    .stat-card .label {
      color: var(--text-muted);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .stat-card .value {
      font-size: 36px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--text-primary), var(--accent-hover));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .stat-card .change {
      font-size: 13px;
      color: var(--success);
      margin-top: 8px;
    }

    /* Table */
    .table-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .table-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
    }

    .table-header h2 {
      font-size: 18px;
      font-weight: 600;
    }

    .table-header .btn-add {
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      padding: 10px 20px;
      color: white;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      text-align: left;
      padding: 16px 24px;
      color: var(--text-muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 500;
      background: var(--bg-secondary);
    }

    td {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr:hover td {
      background: var(--bg-secondary);
    }

    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }

    .status-badge.online {
      background: rgba(16, 185, 129, 0.15);
      color: var(--success);
    }

    .status-badge.offline {
      background: rgba(100, 116, 139, 0.15);
      color: var(--text-muted);
    }

    .actions {
      display: flex;
      gap: 8px;
    }

    .btn-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: none;
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: all 0.2s;
    }

    .btn-icon:hover {
      background: var(--accent);
      color: white;
    }

    .btn-icon.danger:hover {
      background: var(--error);
    }

    /* Error message */
    .error-message {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid var(--error);
      border-radius: var(--radius);
      padding: 12px 16px;
      color: var(--error);
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
    }

    .error-message.show {
      display: block;
      animation: shake 0.4s ease-out;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .login-card {
        padding: 32px 24px;
        margin: 20px;
      }

      .header {
        flex-direction: column;
        gap: 20px;
        text-align: center;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }

      .table-card {
        overflow-x: auto;
      }

      table {
        min-width: 600px;
      }
    }
  </style>
</head>
<body>
  <div class="bg-pattern"></div>
  <div class="bg-grid"></div>

  <!-- Login Page -->
  <div id="login-page" class="login-page">
    <div class="container">
      <div class="login-card">
        <div class="login-logo">
          <div class="icon">✈️</div>
          <h1>Telegram Clone</h1>
          <p>Административная панель</p>
        </div>

        <div id="login-error" class="error-message"></div>

        <form id="login-form">
          <div class="form-group">
            <label>Логин или Email</label>
            <input type="text" id="username" placeholder="admin@telegram.local" required>
          </div>

          <div class="form-group">
            <label>Пароль</label>
            <input type="password" id="password" placeholder="••••••••" required>
          </div>

          <button type="submit" class="btn-primary">Войти в систему</button>
        </form>
      </div>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" class="dashboard">
    <div class="container">
      <div class="header">
        <h1>Панель управления</h1>
        <div class="header-actions">
          <button class="btn-logout" onclick="logout()">Выйти</button>
        </div>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="label">Пользователи</div>
          <div class="value" id="stat-users">-</div>
          <div class="change">Всего пользователей</div>
        </div>
        <div class="stat-card">
          <div class="label">Чаты</div>
          <div class="value" id="stat-chats">-</div>
          <div class="change">Активные диалоги</div>
        </div>
        <div class="stat-card">
          <div class="label">Сообщения</div>
          <div class="value" id="stat-messages">-</div>
          <div class="change">За сегодня</div>
        </div>
        <div class="stat-card">
          <div class="label">Онлайн</div>
          <div class="value" id="stat-online">-</div>
          <div class="change">Сейчас в сети</div>
        </div>
      </div>

      <div class="table-card">
        <div class="table-header">
          <h2>Пользователи</h2>
          <button class="btn-add" onclick="refreshUsers()">Обновить</button>
        </div>
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Имя</th>
              <th>Email</th>
              <th>Статус</th>
              <th>Дата</th>
              <th>Действия</th>
            </tr>
          </thead>
          <tbody id="users-table">
            <tr>
              <td colspan="6" style="text-align: center; color: var(--text-muted);">Загрузка...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:3001/api';

    // Check auth
    const token = localStorage.getItem('adminToken');
    if (token) {
      showDashboard();
    }

    // Login form
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('login-error');

      try {
        const res = await fetch(`${API_URL}/admin/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: username, password })
        });

        const data = await res.json();

        if (!res.ok) {
          errorEl.textContent = data.error || 'Ошибка входа';
          errorEl.classList.add('show');
          return;
        }

        localStorage.setItem('adminToken', data.token);
        localStorage.setItem('admin', JSON.stringify(data.admin));
        showDashboard();
      } catch (err) {
        errorEl.textContent = 'Не удалось подключиться к серверу';
        errorEl.classList.add('show');
      }
    });

    function showDashboard() {
      document.getElementById('login-page').style.display = 'none';
      document.getElementById('dashboard').classList.add('active');
      loadStats();
      loadUsers();
    }

    async function loadStats() {
      try {
        const usersRes = await fetch(`${API_URL}/users/stats`, {
          headers: { 'Authorization': `Bearer ${localStorage.getItem('adminToken')}` }
        });
        const usersData = await usersRes.json();

        document.getElementById('stat-users').textContent = usersData.total || 0;
        document.getElementById('stat-online').textContent = usersData.online || 0;
      } catch (err) {
        console.error('Stats error:', err);
      }
    }

    async function loadUsers() {
      try {
        const res = await fetch(`${API_URL}/users/all`, {
          headers: { 'Authorization': `Bearer ${localStorage.getItem('adminToken')}` }
        });
        const data = await res.json();

        const tbody = document.getElementById('users-table');
        
        if (!data.users || data.users.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: var(--text-muted);">Нет пользователей</td></tr>';
          return;
        }

        tbody.innerHTML = data.users.map(user => `
          <tr>
            <td>${user._id.slice(-8)}</td>
            <td>${user.displayName || user.username}</td>
            <td>${user.email || '-'}</td>
            <td><span class="status-badge ${user.isOnline ? 'online' : 'offline'}">${user.isOnline ? 'Онлайн' : 'Оффлайн'}</span></td>
            <td>${new Date(user.createdAt).toLocaleDateString('ru')}</td>
            <td>
              <div class="actions">
                <button class="btn-icon" onclick="viewUser('${user._id}')">👁️</button>
                <button class="btn-icon danger" onclick="deleteUser('${user._id}')">🗑️</button>
              </div>
            </td>
          </tr>
        `).join('');
      } catch (err) {
        console.error('Users error:', err);
      }
    }

    function refreshUsers() {
      loadUsers();
      loadStats();
    }

    function viewUser(id) {
      alert('Просмотр пользователя: ' + id);
    }

    async function deleteUser(id) {
      if (!confirm('Удалить пользователя?')) return;
      
      try {
        await fetch(`${API_URL}/users/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${localStorage.getItem('adminToken')}` }
        });
        loadUsers();
      } catch (err) {
        console.error('Delete error:', err);
      }
    }

    function logout() {
      localStorage.removeItem('adminToken');
      localStorage.removeItem('admin');
      document.getElementById('dashboard').classList.remove('active');
      document.getElementById('login-page').style.display = 'flex';
    }
  </script>
</body>
</html>
